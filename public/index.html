

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIANA MINI BOT</title>
    <link rel="icon" href="https://files.catbox.moe/im3mlc.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0b0e14',
                        panel: '#121720',
                        neon: '#00f5a0',
                        glow: '#00d4ff',
                        accent: '#00c897',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background: #0b0e14;
            background-image: radial-gradient(ellipse at 30% 50%, rgba(0, 245, 160, 0.05) 0%, transparent 60%),
                              radial-gradient(ellipse at 70% 30%, rgba(0, 212, 255, 0.04) 0%, transparent 50%);
        }
        .glass-panel {
            background: rgba(18, 23, 32, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 245, 160, 0.12);
        }
        .glass-panel:hover {
            border-color: rgba(0, 245, 160, 0.3);
            transition: border-color 0.4s ease;
        }
        .neon-glow {
            box-shadow: 0 0 30px rgba(0, 245, 160, 0.08), inset 0 0 30px rgba(0, 245, 160, 0.02);
        }
        .neon-text {
            text-shadow: 0 0 20px rgba(0, 245, 160, 0.3), 0 0 60px rgba(0, 245, 160, 0.1);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(0, 245, 160, 0.15), 0 0 20px rgba(0, 245, 160, 0.05);
            border-color: #00f5a0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00f5a0, #00c897);
            box-shadow: 0 4px 20px rgba(0, 245, 160, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 35px rgba(0, 245, 160, 0.35);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .pulse-dot {
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        .grid-pattern {
            background-image: 
                linear-gradient(rgba(0, 245, 160, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 160, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 245, 160, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 245, 160, 0.5);
        }
    </style>
</head>
<body class="text-white min-h-screen grid-pattern font-sans antialiased">

    <canvas id="particles" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <div class="container mx-auto px-4 py-6 max-w-md relative z-10">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8 fade-in">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl glass-panel flex items-center justify-center neon-glow">
                    <span class="text-neon font-bold text-xl tracking-tight">DX</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold neon-text tracking-tight">DIANA<span class="text-white/60">-MINI</span></h1>
                    <p class="text-white/30 text-xs tracking-widest uppercase">Quantum Pairing</p>
                </div>
            </div>
        </div>

        <!-- Badge -->
        <div class="flex justify-center mb-7">
            <div class="glass-panel rounded-full px-5 py-1.5 flex items-center gap-2.5 border border-neon/10">
                <span class="w-2 h-2 bg-neon rounded-full pulse-dot"></span>
                <span class="text-neon/80 text-xs font-medium tracking-wider">SECURE CHANNEL</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-3 mb-7">
            <div class="glass-panel rounded-xl p-3.5 text-center border border-white/5">
                <div class="text-2xl font-bold text-neon neon-text">55</div>
                <p class="text-white/30 text-[10px] uppercase tracking-widest mt-0.5">Active</p>
            </div>
            <div class="glass-panel rounded-xl p-3.5 text-center border border-white/5">
                <div class="text-2xl font-bold text-neon neon-text">4</div>
                <p class="text-white/30 text-[10px] uppercase tracking-widest mt-0.5">Servers</p>
            </div>
            <div class="glass-panel rounded-xl p-3.5 text-center border border-white/5">
                <div class="text-2xl font-bold text-neon neon-text">B</div>
                <p class="text-white/30 text-[10px] uppercase tracking-widest mt-0.5">Node</p>
            </div>
        </div>

        <!-- DateTime -->
        <div class="glass-panel rounded-xl px-4 py-2.5 mb-6 text-center border border-white/5">
            <p id="datetime" class="text-white/40 text-xs font-mono tracking-wider"></p>
        </div>

        <!-- Number Input -->
        <div class="glass-panel rounded-2xl p-5 mb-5 border border-white/5 neon-glow">
            <label class="block text-white/50 text-xs uppercase tracking-wider mb-2 flex items-center gap-2">
                <i class="fa-solid fa-mobile-screen-button text-neon/60"></i> WhatsApp Number
            </label>
            <input 
                type="number" 
                id="number" 
                placeholder="e.g., 1809xxxxxxxxx" 
                class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3.5 text-white placeholder:text-white/20 focus:outline-none focus:border-neon/50 input-glow transition text-sm"
            >
        </div>

        <!-- Generate Button -->
        <button id="submit" class="w-full btn-primary text-black font-bold py-4 px-6 rounded-xl text-sm uppercase tracking-wider transition-all duration-300 flex items-center justify-center gap-2.5 mb-4">
            <i class="fa-solid fa-bolt"></i> Generate Pairing Code
        </button>

        <!-- Security Message -->
        <p class="text-center text-white/20 text-[10px] tracking-widest mb-6">
            <i class="fa-solid fa-shield-halved mr-1.5"></i> Encrypted • expires in 5 min
        </p>

        <!-- Result -->
        <div id="waiting-message" class="hidden text-center text-neon/70 text-sm mb-3">
            <span class="inline-block w-4 h-4 border-2 border-white/10 border-t-neon rounded-full animate-spin mr-2 align-middle"></span>
            Processing...
        </div>
        <div id="pair" class="text-center font-mono glass-panel rounded-xl p-3.5 mb-3 text-sm break-all min-h-[52px] flex items-center justify-center border border-white/5"></div>
        <button id="copy-btn" class="hidden w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white/60 hover:text-neon py-3 rounded-xl transition text-sm tracking-wider">
            <i class="fa-regular fa-copy mr-2"></i> Copy Code
        </button>

        <!-- Footer -->
        <div class="mt-8 text-center text-white/20 text-[10px] tracking-wider">
            <p>⚡ DIANA MINI BOT · Quantum Engine</p>
            <div class="flex justify-center gap-5 mt-3">
                <a href="#" class="hover:text-neon/60 transition">Support</a>
                <a href="#" class="hover:text-neon/60 transition">Refresh</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <script>
        // Date & Time
        function updateDateTime() {
            const now = new Date();
            const opts = { weekday:'short', year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' };
            document.getElementById('datetime').textContent = now.toLocaleDateString('en-US', opts);
        }
        updateDateTime();
        setInterval(updateDateTime, 30000);

        // Particles
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let w, h;
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const COUNT = 45;
        for (let i = 0; i < COUNT; i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.2 + 0.4,
                a: Math.random() * 0.25 + 0.05,
                vy: Math.random() * 0.2 + 0.1,
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, w, h);
            for (const p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 245, 160, ${p.a})`;
                ctx.fill();
                p.y += p.vy;
                if (p.y > h) { p.y = -4; p.x = Math.random() * w; }
            }
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // --- Functionality ---
        const submitBtn = document.getElementById("submit");
        const numberInput = document.getElementById("number");
        const pairOutput = document.getElementById("pair");
        const waitingMsg = document.getElementById("waiting-message");
        const copyBtn = document.getElementById("copy-btn");

        submitBtn.addEventListener("click", async (e) => {
            e.preventDefault();
            const number = numberInput.value.replace(/[^0-9]/g, "");
            if (!number || number.length < 11) {
                pairOutput.innerHTML = `<span style="color:#ff6b6b; font-size:0.9rem;">❌ Invalid number</span>`;
                return;
            }
            waitingMsg.style.display = "block";
            pairOutput.innerHTML = "";
            copyBtn.style.display = "none";
            try {
                const { data } = await axios.get(`/code?number=${number}`);
                const code = data.code || "Unavailable";
                waitingMsg.style.display = "none";
                pairOutput.innerHTML = `<span style="color:#00f5a0; font-weight:500;">✅ Code: </span><span style="color:#fff; font-weight:600; letter-spacing:1px;">${code}</span>`;
                copyBtn.style.display = "inline-block";
                copyBtn.onclick = async () => {
                    await navigator.clipboard.writeText(code);
                    copyBtn.innerHTML = '<i class="fa-regular fa-check-circle mr-2"></i> Copied!';
                    setTimeout(() => copyBtn.innerHTML = '<i class="fa-regular fa-copy mr-2"></i> Copy Code', 1800);
                };
            } catch (err) {
                waitingMsg.style.display = "none";
                pairOutput.innerHTML = `<span style="color:#ff6b6b; font-size:0.9rem;">⚠️ Error, try again</span>`;
            }
        });
    </script>
</body>
</html>
